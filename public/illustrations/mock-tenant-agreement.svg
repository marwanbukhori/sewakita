  <text x="32" y="268" font-family="system-ui" font-size="9" fill="#1F2937">2. Quiet hours 10pm - 7am</text>
  <rect x="20" y="282" width="240" height="28" rx="8" fill="#F9FAFB"/>
  <text x="32" y="300" font-family="system-ui" font-size="9" fill="#1F2937">3. No pets allowed</text>
  <!-- Download -->
  <rect x="20" y="330" width="240" height="44" rx="12" fill="white" stroke="#0F766E" stroke-width="2"/>
