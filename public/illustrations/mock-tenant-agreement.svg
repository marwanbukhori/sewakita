  <!-- Signed badge -->
  <rect x="20" y="80" width="240" height="40" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="44" cy="100" r="10" fill="#22C55E"/>
  <text x="44" y="104" font-family="system-ui" font-size="10" fill="white" text-anchor="middle">✓</text>
  <text x="62" y="104" font-family="system-ui" font-size="11" font-weight="600" fill="#15803D">Signed by both parties</text>
  <!-- Terms -->
  <rect x="20" y="134" width="116" height="46" rx="10" fill="#F9FAFB"/>
  <text x="32" y="152" font-family="system-ui" font-size="8" fill="#9CA3AF">RENT</text>
  <text x="32" y="168" font-family="system-ui" font-size="13" font-weight="700" fill="#1F2937">RM500/mo</text>
  <rect x="144" y="134" width="116" height="46" rx="10" fill="#F9FAFB"/>
  <text x="156" y="152" font-family="system-ui" font-size="8" fill="#9CA3AF">DEPOSIT</text>
  <text x="156" y="168" font-family="system-ui" font-size="13" font-weight="700" fill="#1F2937">RM1,000</text>
  <!-- Rules -->
