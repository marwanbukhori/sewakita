<svg width="280" height="480" viewBox="0 0 280 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Phone frame -->
  <rect x="4" y="4" width="272" height="472" rx="28" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="100" y="12" width="80" height="6" rx="3" fill="#E5E7EB"/>
  <!-- Status bar -->
  <rect x="20" y="30" width="240" height="36" rx="8" fill="#0F766E"/>
  <text x="30" y="53" font-family="system-ui" font-size="13" font-weight="600" fill="white">Properties</text>
  <rect x="220" y="42" width="30" height="14" rx="7" fill="white" opacity="0.3"/>
  <!-- Property card 1 -->
  <rect x="20" y="80" width="240" height="90" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="32" y="92" width="120" height="10" rx="3" fill="#1F2937"/>
  <rect x="32" y="108" width="80" height="8" rx="3" fill="#9CA3AF"/>
  <!-- Occupancy bar -->
  <rect x="32" y="126" width="180" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="32" y="126" width="130" height="6" rx="3" fill="#0F766E"/>
  <text x="32" y="150" font-family="system-ui" font-size="10" fill="#6B7280">3/4 rooms</text>
  <text x="180" y="150" font-family="system-ui" font-size="10" fill="#0F766E" font-weight="600">75%</text>
  <!-- Property card 2 -->
  <rect x="20" y="184" width="240" height="90" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="32" y="196" width="140" height="10" rx="3" fill="#1F2937"/>
  <rect x="32" y="212" width="100" height="8" rx="3" fill="#9CA3AF"/>
  <rect x="32" y="230" width="180" height="6" rx="3" fill="#E5E7EB"/>
  <rect x="32" y="230" width="90" height="6" rx="3" fill="#0F766E"/>
  <text x="32" y="254" font-family="system-ui" font-size="10" fill="#6B7280">2/4 rooms</text>
  <text x="180" y="254" font-family="system-ui" font-size="10" fill="#0F766E" font-weight="600">50%</text>
  <!-- Add button -->
  <rect x="20" y="290" width="240" height="44" rx="12" fill="#0F766E"/>
  <text x="110" y="317" font-family="system-ui" font-size="13" font-weight="600" fill="white" text-anchor="middle">+ Add Property</text>
  <!-- Bottom nav -->
  <rect x="0" y="430" width="280" height="50" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <circle cx="56" cy="452" r="10" fill="#0F766E" opacity="0.15"/>
  <circle cx="140" cy="452" r="10" fill="#E5E7EB"/>
  <circle cx="224" cy="452" r="10" fill="#E5E7EB"/>
</svg>
